name: Build VBA
on:
  - workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
      - name: "Build VBA-Enabled Workbook (using own action)"
        uses: ./
        with:
          sourceDir: "./tests""
      - name: "Upload Artifact"
        uses: actions/upload-artifact@v3
        with:
          name: "VBA-Enabled Workbook"