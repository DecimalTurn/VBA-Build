name: Diff Access VCS Add-in Source

on:
  workflow_dispatch:
    inputs:
      url1:
        description: 'Download URL for first add-in zip'
        required: true
      url2:
        description: 'Download URL for second add-in zip'
        required: true
      label1:
        description: 'Label for first add-in (used in output)'
        required: false
        default: 'addin1'
      label2:
        description: 'Label for second add-in (used in output)'
        required: false
        default: 'addin2'

jobs:
  diff:
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Setup Access
        uses: DecimalTurn/setup-vba@v0
        with:
          office-apps: Access
          install-office: true

      - name: Download both releases
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ inputs.label1 }}", "${{ inputs.label2 }}" -Force

          Invoke-WebRequest "${{ inputs.url1 }}" -OutFile addin1.zip
          Expand-Archive addin1.zip -DestinationPath "${{ inputs.label1 }}" -Force

          Invoke-WebRequest "${{ inputs.url2 }}" -OutFile addin2.zip
          Expand-Archive addin2.zip -DestinationPath "${{ inputs.label2 }}" -Force

          Write-Host "${{ inputs.label1 }} files:"
          Get-ChildItem "${{ inputs.label1 }}" | Select-Object Name, Length
          Write-Host "${{ inputs.label2 }} files:"
          Get-ChildItem "${{ inputs.label2 }}" | Select-Object Name, Length

      - name: Compare database objects via COM
        shell: pwsh
        run: |
          function Export-VBAComponents($accdbPath, $outDir) {
            New-Item -ItemType Directory -Path $outDir -Force
            $access = New-Object -ComObject Access.Application
            $access.Visible = $false
            $access.AutomationSecurity = 1
            $access.OpenCurrentDatabase((Resolve-Path $accdbPath))

            $vbe = $access.VBE
            $proj = $vbe.ActiveVBProject
            Write-Host "VBA Components: $($proj.VBComponents.Count)"
            foreach ($comp in $proj.VBComponents) {
              $name = "$($comp.Name)$(switch($comp.Type){1{'.bas'}2{'.cls'}3{'.frm'}100{'.cls'}})"
              $path = Join-Path $outDir $name
              try {
                $comp.Export($path)
              } catch {
                Write-Host "  Failed to export: $name"
              }
            }
            $access.Quit()
            [System.Runtime.InteropServices.Marshal]::ReleaseComObject($access) | Out-Null
            [GC]::Collect()
            Start-Sleep -Seconds 3
          }

          Export-VBAComponents "${{ inputs.label1 }}\Version Control.accda" "${{ inputs.label1 }}-vba"
          Export-VBAComponents "${{ inputs.label2 }}\Version Control.accda" "${{ inputs.label2 }}-vba"

          Write-Host "=== VBA file counts ==="
          Write-Host "${{ inputs.label1 }}: $((Get-ChildItem '${{ inputs.label1 }}-vba' -File).Count) files"
          Write-Host "${{ inputs.label2 }}: $((Get-ChildItem '${{ inputs.label2 }}-vba' -File).Count) files"

      - name: Git diff of VBA source
        shell: bash
        run: |
          cd "${{ inputs.label1 }}-vba"
          git init
          git config user.name "diff-bot"
          git config user.email "diff@bot"
          git add -A
          git commit -m "${{ inputs.label1 }}"

          # Overlay the second add-in's VBA source
          cp -r "../${{ inputs.label2 }}-vba/"* . 2>/dev/null || true

          echo "=== Files that differ ==="
          git diff --stat

          echo ""
          echo "=== Detailed diff (first 500 lines) ==="
          git diff | head -500
          }
