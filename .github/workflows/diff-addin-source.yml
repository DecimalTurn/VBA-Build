name: Diff VCS Add-in Source

on:
  workflow_dispatch:

jobs:
  diff:
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Setup Access
        uses: DecimalTurn/setup-vba@v0
        with:
          office-apps: Access
          install-office: true

      - name: Download both releases
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path josef-original, our-rebuild -Force

          # Josef's working build
          $url1 = "https://github.com/josef-poetzl/msaccess-vcs-addin/releases/download/v4.1.2-build/Version_Control_v4.1.2-build.zip"
          Invoke-WebRequest $url1 -OutFile josef.zip
          Expand-Archive josef.zip -DestinationPath josef-original -Force

          # Our rebuild
          $url2 = "https://github.com/DecimalTurn/msaccess-vcs-addin/releases/download/v4.1.2-josef-rebuild/Version_Control_v4.1.2-josef-rebuild.zip"
          Invoke-WebRequest $url2 -OutFile ours.zip
          Expand-Archive ours.zip -DestinationPath our-rebuild -Force

          Write-Host "Josef files:"
          Get-ChildItem josef-original | Select-Object Name, Length
          Write-Host "Our files:"
          Get-ChildItem our-rebuild | Select-Object Name, Length

      - name: Install VCS add-in as export tool
        shell: pwsh
        run: |
          # Install josef's addin to use as the export tool
          $addinFolder = "$env:APPDATA\MSAccessVCS"
          New-Item -ItemType Directory -Path $addinFolder -Force
          Copy-Item "josef-original\Version Control.accda" "$addinFolder\Version Control.accda" -Force

          # Set trusted location
          $access = New-Object -ComObject Access.Application
          $access.Visible = $false
          $access.AutomationSecurity = 1  ' msoAutomationSecurityLow
          $access.Quit()
          [System.Runtime.InteropServices.Marshal]::ReleaseComObject($access) | Out-Null

          Write-Host "Add-in installed to $addinFolder"

      - name: Export source from both add-ins
        shell: pwsh
        run: |
          $addinPath = "$env:APPDATA\MSAccessVCS\Version Control"

          @(
            @{Name="josef"; Path="josef-original\Version Control.accda"; OutDir="josef-source"},
            @{Name="ours"; Path="our-rebuild\Version Control.accda"; OutDir="our-source"}
          ) | ForEach-Object {
            New-Item -ItemType Directory -Path $_.OutDir -Force

            Write-Host "=== Exporting $($_.Name) add-in source ==="
            $access = New-Object -ComObject Access.Application
            $access.Visible = $false
            $access.AutomationSecurity = 1

            $fullPath = Resolve-Path $_.Path
            $outPath = Resolve-Path $_.OutDir

            Write-Host "Opening: $fullPath"
            $access.OpenCurrentDatabase($fullPath)

            Write-Host "Running export..."
            try {
              $access.Run("$addinPath.SetInteractionMode", [ref] 1)
              $access.Run("$addinPath.HandleRibbonCommand", [ref] "btnExport", [ref] "$outPath")
              Start-Sleep -Seconds 10
            } catch {
              Write-Host "Export command error: $_"
            }

            $access.Quit()
            [System.Runtime.InteropServices.Marshal]::ReleaseComObject($access) | Out-Null
            [GC]::Collect()
            Start-Sleep -Seconds 5
            Write-Host "Exported $($_.Name) to $($_.OutDir)"
          }

      - name: Compare source trees
        shell: pwsh
        run: |
          Write-Host "=== File count ==="
          Write-Host "Josef: $((Get-ChildItem josef-source -Recurse -File).Count) files"
          Write-Host "Ours:  $((Get-ChildItem our-source -Recurse -File).Count) files"

          Write-Host ""
          Write-Host "=== Files only in Josef ==="
          $josefFiles = Get-ChildItem josef-source -Recurse -File | ForEach-Object { $_.FullName.Replace((Resolve-Path josef-source).Path + '\', '') }
          $ourFiles = Get-ChildItem our-source -Recurse -File | ForEach-Object { $_.FullName.Replace((Resolve-Path our-source).Path + '\', '') }
          Compare-Object $josefFiles $ourFiles | Where-Object SideIndicator -eq '<=' | ForEach-Object { Write-Host "  $($_.InputObject)" }

          Write-Host ""
          Write-Host "=== Files only in Ours ==="
          Compare-Object $josefFiles $ourFiles | Where-Object SideIndicator -eq '=>' | ForEach-Object { Write-Host "  $($_.InputObject)" }

          Write-Host ""
          Write-Host "=== Files with content differences ==="
          $common = Compare-Object $josefFiles $ourFiles -IncludeEqual -ExcludeDifferent | ForEach-Object InputObject
          foreach ($file in $common) {
            $jPath = Join-Path josef-source $file
            $oPath = Join-Path our-source $file
            if ((Get-FileHash $jPath -Algorithm SHA256).Hash -ne (Get-FileHash $oPath -Algorithm SHA256).Hash) {
              Write-Host "  DIFF: $file"
            }
          }

      - name: Show sample diff
        shell: pwsh
        run: |
          Write-Host "=== Sample: vcs-options.json ==="
          if ((Test-Path "josef-source\vcs-options.json") -and (Test-Path "our-source\vcs-options.json")) {
            $j = Get-Content "josef-source\vcs-options.json" -Raw
            $o = Get-Content "our-source\vcs-options.json" -Raw
            if ($j -ne $o) {
              Write-Host "Josef vcs-options:"
              Write-Host $j
              Write-Host "Our vcs-options:"
              Write-Host $o
            } else {
              Write-Host "vcs-options.json is identical"
            }
          }
