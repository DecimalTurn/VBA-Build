name: Diff Access VCS Add-in Source

on:
  workflow_dispatch:
    inputs:
      url1:
        description: 'Download URL for first add-in zip'
        required: true
      url2:
        description: 'Download URL for second add-in zip'
        required: true
      label1:
        description: 'Label for first add-in (used in output)'
        required: false
        default: 'addin1'
      label2:
        description: 'Label for second add-in (used in output)'
        required: false
        default: 'addin2'

jobs:
  diff:
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Setup Access
        uses: DecimalTurn/setup-vba@v0
        with:
          office-apps: Access
          install-office: true

      - name: Download both releases
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "${{ inputs.label1 }}", "${{ inputs.label2 }}" -Force

          Invoke-WebRequest "${{ inputs.url1 }}" -OutFile addin1.zip
          Expand-Archive addin1.zip -DestinationPath "${{ inputs.label1 }}" -Force

          Invoke-WebRequest "${{ inputs.url2 }}" -OutFile addin2.zip
          Expand-Archive addin2.zip -DestinationPath "${{ inputs.label2 }}" -Force

          Write-Host "${{ inputs.label1 }} files:"
          Get-ChildItem "${{ inputs.label1 }}" | Select-Object Name, Length
          Write-Host "${{ inputs.label2 }} files:"
          Get-ChildItem "${{ inputs.label2 }}" | Select-Object Name, Length

      - name: Compare database objects via COM
        shell: pwsh
        run: |
          function Get-DbObjectInfo($accdbPath, $label) {
            Write-Host "=== $label ==="
            $access = New-Object -ComObject Access.Application
            $access.Visible = $false
            $access.AutomationSecurity = 1
            $access.OpenCurrentDatabase((Resolve-Path $accdbPath))

            Write-Host "  Modules:     $($access.Modules.Count)"
            Write-Host "  Forms:       $($access.Forms.Count)"
            Write-Host "  Reports:     $($access.Reports.Count)"
            Write-Host "  Macros:      $($access.CurrentProject.AllMacros.Count)"
            Write-Host "  References:  $($access.References.Count)"
            Write-Host "  DB size:     $((Get-Item $accdbPath).Length) bytes"

            # List all module names
            Write-Host "  Module names:"
            foreach ($mod in $access.Modules) {
              Write-Host "    $($mod.Name)"
            }

            # List all form names
            Write-Host "  Form names:"
            foreach ($frm in $access.Forms) {
              Write-Host "    $($frm.Name)"
            }

            # Check if VBA project is compiled
            try {
              $vbe = $access.VBE
              Write-Host "  VBA project compiled: $(-not $vbe.ActiveVBProject.Collection.Count)"
            } catch {
              Write-Host "  VBA project: could not access"
            }

            $access.Quit()
            [System.Runtime.InteropServices.Marshal]::ReleaseComObject($access) | Out-Null
            [GC]::Collect()
            Start-Sleep -Seconds 3
          }

          Get-DbObjectInfo "${{ inputs.label1 }}\Version Control.accda" "${{ inputs.label1 }}"
          Get-DbObjectInfo "${{ inputs.label2 }}\Version Control.accda" "${{ inputs.label2 }}"

      - name: Binary comparison
        shell: pwsh
        run: |
          $f1 = "${{ inputs.label1 }}\Version Control.accda"
          $f2 = "${{ inputs.label2 }}\Version Control.accda"

          Write-Host "=== Binary comparison ==="
          $hash1 = (Get-FileHash $f1 -Algorithm SHA256).Hash
          $hash2 = (Get-FileHash $f2 -Algorithm SHA256).Hash
          Write-Host "${{ inputs.label1 }} SHA256: $hash1"
          Write-Host "${{ inputs.label2 }} SHA256: $hash2"

          if ($hash1 -eq $hash2) {
            Write-Host "Files are byte-identical"
          } else {
            Write-Host "Files differ ($((Get-Item $f1).Length) vs $((Get-Item $f2).Length) bytes)"
          }
